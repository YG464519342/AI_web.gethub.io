<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="趣味答题平台 - 数学答题挑战">
  <title>数学答题 - 趣味答题平台</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 自定义CSS -->
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen">

  <!-- 顶部导航栏 -->
  <nav class="bg-white/80 backdrop-blur-sm sticky top-0 z-50 border-b-3 border-indigo-200">
    <div class="container mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-indigo-900 hover:text-indigo-700 transition-colors">
          <span class="text-2xl">←</span>
          <span class="font-bold text-lg" data-i18n="backToHome">返回首页</span>
        </a>
        <div class="flex items-center gap-4">
          <div class="clay-card px-4 py-2 bg-gradient-to-r from-green-200 to-blue-200">
            <span class="text-sm text-indigo-700" data-i18n="subject">科目:</span>
            <span class="font-bold text-indigo-900 ml-1" id="subject-name" data-i18n="math">数学</span>
          </div>
          <div class="clay-card px-4 py-2 bg-gradient-to-r from-yellow-200 to-orange-200">
            <span class="text-sm text-indigo-700" data-i18n="score">得分:</span>
            <span class="font-bold text-indigo-900 ml-1" id="score">0</span>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主答题区域 -->
  <main class="container mx-auto px-4 py-8 max-w-4xl">

    <!-- 进度指示器 -->
    <div class="mb-8">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-semibold text-indigo-700" data-i18n="progress">答题进度</span>
        <span class="text-sm font-semibold text-indigo-900" id="progress-text"><span data-i18n="questionOf">第</span> 1 <span data-i18n="totalQuestions">题 / 共</span> 10 <span data-i18n="questions">题</span></span>
      </div>
      <div class="relative h-3 bg-indigo-100 rounded-full overflow-hidden">
        <div id="progress-bar" class="absolute inset-y-0 left-0 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-500 ease-out" style="width: 10%;"></div>
      </div>
    </div>

    <!-- 题目卡片 -->
    <div id="question-card" class="clay-card p-8 md:p-12 bg-white mb-6">
      <!-- 题目编号 -->
      <div class="flex items-center gap-3 mb-6">
        <div class="clay-card w-12 h-12 bg-gradient-to-br from-pink-200 to-purple-200 rounded-full flex items-center justify-center">
          <span class="text-xl font-bold text-indigo-900" id="question-number">1</span>
        </div>
        <div class="flex-1">
          <span class="text-sm text-indigo-600 font-semibold" data-i18n="multipleChoice">选择题</span>
        </div>
        <div class="clay-card px-3 py-1 bg-gradient-to-r from-blue-200 to-cyan-200">
          <span class="text-xs text-indigo-700">⏱️ </span>
          <span class="text-sm font-bold text-indigo-900" id="timer">30</span>
          <span class="text-xs text-indigo-700" data-i18n="seconds">秒</span>
        </div>
      </div>

      <!-- 题目内容 -->
      <div class="mb-8">
        <h2 class="text-2xl md:text-3xl font-bold text-indigo-900 mb-4" id="question-text">
          计算: 15 + 27 = ?
        </h2>
        <p class="text-indigo-600 text-sm" data-i18n="selectCorrectAnswer">请选择正确答案</p>
      </div>

      <!-- 选项列表 -->
      <div class="space-y-4" id="options-container">
        <!-- 选项将通过JavaScript动态生成 -->
      </div>
    </div>

    <!-- 反馈提示 -->
    <div id="feedback" class="hidden clay-card p-6 mb-6 text-center">
      <div id="feedback-icon" class="text-6xl mb-3"></div>
      <h3 id="feedback-title" class="text-2xl font-bold mb-2"></h3>
      <p id="feedback-message" class="text-lg"></p>
    </div>

    <!-- 操作按钮 -->
    <div class="flex gap-4 justify-center">
      <button id="submit-btn" class="clay-button bg-gradient-to-r from-indigo-500 to-purple-500 text-white text-lg px-8 py-3 font-bold disabled:opacity-50 disabled:cursor-not-allowed" data-i18n="submitAnswer" disabled>
        提交答案
      </button>
      <button id="next-btn" class="hidden clay-button bg-gradient-to-r from-green-500 to-emerald-500 text-white text-lg px-8 py-3 font-bold" data-i18n="nextQuestion">
        下一题 →
      </button>
      <button id="finish-btn" class="hidden clay-button bg-gradient-to-r from-orange-500 to-pink-500 text-white text-lg px-8 py-3 font-bold" data-i18n="viewResults">
        查看结果 🎉
      </button>
    </div>

    <!-- 提示卡片 -->
    <div class="mt-8 clay-card p-6 bg-gradient-to-r from-yellow-100 to-orange-100">
      <div class="flex items-start gap-3">
        <span class="text-2xl">💡</span>
        <div>
          <h4 class="font-bold text-indigo-900 mb-1" data-i18n="tipTitle">答题小贴士</h4>
          <p class="text-sm text-indigo-700" data-i18n="tipContent">仔细阅读题目,选择你认为正确的答案。答对得10分,答错不扣分!</p>
        </div>
      </div>
    </div>

  </main>

  <!-- 结果模态框 -->
  <div id="result-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="clay-card bg-white p-8 md:p-12 max-w-2xl w-full text-center animate-bounce-in">
      <div class="text-8xl mb-6" id="result-emoji">🎉</div>
      <h2 class="text-4xl font-bold text-indigo-900 mb-4" id="result-title" data-i18n="congratulations">恭喜完成!</h2>
      <div class="clay-card p-6 bg-gradient-to-r from-yellow-200 to-orange-200 mb-6">
        <p class="text-lg text-indigo-700 mb-2" data-i18n="yourScore">你的得分</p>
        <p class="text-6xl font-bold text-indigo-900" id="final-score">0</p>
        <p class="text-sm text-indigo-600 mt-2" id="accuracy"><span data-i18n="accuracy">正确率</span>: 0%</p>
      </div>
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="clay-card p-4 bg-green-100">
          <p class="text-2xl font-bold text-green-700" id="correct-count">0</p>
          <p class="text-xs text-green-600" data-i18n="correct">答对</p>
        </div>
        <div class="clay-card p-4 bg-red-100">
          <p class="text-2xl font-bold text-red-700" id="wrong-count">0</p>
          <p class="text-xs text-red-600" data-i18n="wrong">答错</p>
        </div>
        <div class="clay-card p-4 bg-blue-100">
          <p class="text-2xl font-bold text-blue-700" id="time-spent">0</p>
          <p class="text-xs text-blue-600" data-i18n="timeSpent">用时(秒)</p>
        </div>
      </div>
      <div class="flex gap-4 justify-center">
        <button onclick="location.reload()" class="clay-button bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-6 py-3" data-i18n="tryAgain">
          再来一次
        </button>
        <a href="index.html" class="clay-button bg-gradient-to-r from-orange-500 to-pink-500 text-white px-6 py-3" data-i18n="backToHome">
          返回首页
        </a>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/quiz.js"></script>

</body>
</html>
